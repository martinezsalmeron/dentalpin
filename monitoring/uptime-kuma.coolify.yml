services:
  uptimekuma:
    image: louislam/uptime-kuma:1
    environment:
      # Coolify auto-injects FQDN + provisions SSL when this var is set.
      # Service name must match the env var suffix (no dashes), otherwise
      # Coolify does not wire the Traefik labels.
      # Set KUMA_FQDN in the Coolify UI (e.g. status.dentalpin.com).
      SERVICE_FQDN_UPTIMEKUMA_3001: ${KUMA_FQDN}
    volumes:
      - kuma_data:/app/data
    healthcheck:
      test: ["CMD", "extra/healthcheck"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  kuma_data:
