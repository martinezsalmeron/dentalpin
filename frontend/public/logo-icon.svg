<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-label="DentalPin">
  <!-- Soft pastel rounded square backdrop (calm, not saturated) -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#E0F2FE"/>
  <rect x="2" y="2" width="60" height="60" rx="14" stroke="#0EA5E9" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Tooth silhouette: two soft cusps + two roots, rounded -->
  <path d="M32 14
           c -6 0 -10 3 -12 3
           c -3 0 -6 3 -6 9
           c 0 5 2 8 3 12
           c 1 4 1 9 4 11
           c 2 1 3 -3 4 -7
           c 1 -3 2 -5 3 -5
           c 1 0 2 2 3 5
           c 1 4 2 8 4 7
           c 3 -2 3 -7 4 -11
           c 1 -4 3 -7 3 -12
           c 0 -6 -3 -9 -6 -9
           c -2 0 -6 -3 -12 -3 Z"
        fill="#FFFFFF"
        stroke="#0EA5E9"
        stroke-width="2"
        stroke-linejoin="round"
        stroke-linecap="round"/>

  <!-- Pin dot: the "Pin" in DentalPin. Saturated accent (small, allowed) -->
  <circle cx="32" cy="27" r="3.25" fill="#0EA5E9"/>
  <circle cx="32" cy="27" r="1.1" fill="#FFFFFF"/>
</svg>
