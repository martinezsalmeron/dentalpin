name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check backend/

      - name: Run ruff format check
        run: ruff format --check backend/

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: dental_clinic_test
          POSTGRES_USER: dental
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://dental:testpass@localhost:5432/dental_clinic_test
      SECRET_KEY: test-secret-key-for-ci
      ENVIRONMENT: test
      TESTING: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"

      - name: Run tests (default set)
        working-directory: backend
        run: |
          python -m pytest -v --tb=short

      - name: Alembic round-trip (base → head → base → head)
        working-directory: backend
        run: |
          python -m pytest -v -m alembic_roundtrip --tb=short

  manifest-consistency:
    # Static manifest sanity — every entry point in pyproject.toml must
    # resolve, declare a valid manifest, and its role permissions must
    # match the ROLE_PERMISSIONS table. Runs without a database so we
    # get a quick signal on PRs that touch modules.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"

      - name: Validate manifests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://dental:testpass@localhost:5432/stub
          SECRET_KEY: ci-stub
          ENVIRONMENT: test
          TESTING: "true"
        run: |
          python -m pytest tests/test_module_manifest.py \
                           tests/test_module_manifests_consistency.py \
                           tests/test_manifest_validator.py \
                           tests/test_module_loader.py \
                           -v --tb=short

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  frontend-typecheck:
    # Guards against broken Vue/TS imports across module Nuxt layers
    # (Fase B.6). `modules.json` is written by the backend at runtime;
    # we stub an empty one here so Nuxt picks up only the host sources.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Ensure empty modules.json
        working-directory: frontend
        run: |
          echo '{"layers":[],"modules":[],"version":1}' > modules.json

      - name: Nuxt prepare (generates .nuxt type stubs)
        working-directory: frontend
        run: npx nuxi prepare

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run tests
        working-directory: frontend
        run: npm run test

  e2e:
    # Browser E2E smoke. Boots the full stack inside the runner via
    # docker-compose, seeds demo data, then drives it with Playwright
    # from the host. Slow (~5 min). Required on main + PRs.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      POSTGRES_PASSWORD: testpass
      SECRET_KEY: ci-secret-key-for-e2e

    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        run: |
          cat > .env <<EOF
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          SECRET_KEY=${SECRET_KEY}
          ENVIRONMENT=development
          EOF

      - name: Boot stack
        run: docker compose up -d db backend frontend

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "backend ready"; break
            fi
            sleep 2
          done

      - name: Run migrations
        # Backend lifespan doesn't run alembic upgrade on boot (dev
        # workflow runs `./scripts/reset-db.sh` by hand). CI needs an
        # explicit step so `./scripts/seed-demo.sh` has a schema.
        run: docker compose exec -T backend alembic upgrade head

      - name: Seed demo data
        run: ./scripts/seed-demo.sh --lang es

      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            if [ "$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000/login)" = "200" ]; then
              echo "frontend ready"; break
            fi
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright + browsers
        working-directory: frontend
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run E2E
        working-directory: frontend
        run: npx playwright test --reporter=list

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
