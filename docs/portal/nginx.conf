server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # VitePress emits clean URLs (cleanUrls: true) — try the path as-is, then
    # with a trailing slash, then with a .html extension before 404.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Pre-rendered per-screen help fragments (fase 5 wires the in-app drawer).
    # CORS is permissive for the public portal; tighten to the app origin
    # once `app.dentalpin.com` is known.
    location /help/ {
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        try_files $uri $uri.html =404;
    }

    # Compression for text assets.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Long cache for hashed asset bundles VitePress emits under /assets/.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Hide nginx version in error pages and headers.
    server_tokens off;
}
